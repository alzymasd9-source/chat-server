<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blend Chat - شات فوري مطور</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat-container { width: 100%; max-width: 600px; height: 80vh; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #075e54; color: white; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; background: #efeae2; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 8px; max-width: 75%; width: fit-content; word-wrap: break-word; }
        .message.system { background: #ffe0b2; align-self: center; font-size: 0.85rem; color: #5c3d11; }
        .message.user { background: #fff; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        #form-container { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; }
        #input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 1rem; }
        #send-btn { background: #128c7e; color: white; border: none; padding: 0 20px; border-radius: 25px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        #send-btn:hover { background: #075e54; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">Blend Chat - غرفة دردشة عامة</div>
    <div id="messages"></div>
    <div id="form-container">
        <input id="input" autocomplete="off" placeholder="اكتب رسالتك هنا..." />
        <button id="send-btn">إرسال</button>
    </div>
</div>

<!-- استدعاء مكتبة Socket.io من جهة العميل -->
<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    // طلب اسم المستخدم عند الدخول
    const username = prompt("أدخل اسمك المستعار لبدء الدردشة:") || "مستخدم_" + Math.floor(Math.random() * 1000);
    socket.emit('join', username);

    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    // إرسال الرسالة عند الضغط على الزر أو Enter
    function sendMessage() {
        if (input.value.trim() !== '') {
            socket.emit('chat message', input.value);
            input.value = '';
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

    // استقبال الرسائل وعرضها في الواجهة
    socket.on('chat message', (data) => {
        const item = document.createElement('div');
        item.classList.add('message');
        
        if (data.user === '🤖 النظام') {
            item.classList.add('system');
            item.textContent = data.text;
        } else {
            item.classList.add('user');
            item.innerHTML = `<strong>${data.user}:</strong> ${data.text}`;
        }
        
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight; // التمرير التلقائي لأسفل الشاشة
    });
</script>
</body>
</html>
