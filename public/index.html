<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات الجوال العربي المطوّر</title>
    <!-- تم إضافة تنسيقات CSS هنا (راجع المستودع للاطلاع على التفاصيل الكاملة) -->
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f7; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-screen { background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 15px; }
        .main-btn { background: #007bff; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
        .secondary-btn { background: #6c757d; }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .row { display: flex; gap: 10px; }
        .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .room-card { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; }
        .room-link { color: #28a745; cursor: pointer; text-decoration: underline; font-weight: bold; }
        #chat-interface { display: none; width: 100%; max-width: 500px; background: #fff; height: 100vh; flex-direction: row; }
        #chat-sidebar { width: 140px; background: #2c3e50; color: #fff; padding: 10px; }
        #messages { flex: 1; overflow-y: auto; list-style-type: none; margin: 0; padding: 15px; }
        .received { background: #fff; border: 1px solid #e0e0e0; }
        .sent { background: #e3f2fd; border: 1px solid #bbdefb; }
        .system-msg { background: #fff3cd; color: #856404; text-align: center; padding: 5px; }
    </style>
    <script>
        // دالة التنقل - تم نقلها للأعلى لتشتغل فوراً
        function showScreen(screenId) {
            var screens = ['screen-main', 'screen-visitor', 'screen-login', 'screen-register', 'screen-rooms', 'chat-interface'];
            for(var i=0; i<screens.length; i++) {
                var el = document.getElementById(screens[i]);
                if(el) el.style.display = 'none';
            }
            var target = document.getElementById(screenId);
            if(target) target.style.display = (screenId === 'chat-interface') ? 'flex' : 'block';
        }
    </script>
</head>
<body>
    <!-- شاشات التطبيق (الرئيسية، الزوار، التسجيل، الغرف، الشات) -->
    <!-- يرجى نسخ الهيكل الكامل من الملف الأصلي في المستودع لضمان عمل الأزرار -->
    <div id="screen-main" class="auth-screen">
        <h2>شات الجوال الكتابي</h2>
        <button class="main-btn" onclick="showScreen('screen-visitor')">دخول زوار 👤</button>
        <button class="main-btn secondary-btn" onclick="showScreen('screen-login')">دخول الأعضاء 🔐</button>
    </div>
    
    <!-- باقي الشاشات... -->

    <!-- تم نقل استدعاءات السكريبت إلى النهاية -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // حماية اتصال السيرفر لضمان استجابة الواجهة
        var socket;
        try {
            socket = io();
        } catch(e) {
            console.log('Socket connection delayed');
            socket = { on: function(){}, emit: function(){} };
        }
        // ... باقي دوال منطق الشات (sendMessage, login, إلخ) ...
    </script>
</body>
</html>
